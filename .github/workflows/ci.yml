name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run Maven tests
        working-directory: bot-server
        run: mvn test

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: ml-server/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ml-server/requirements.txt

      - name: Run Python unit tests
        env:
          PYTHONPATH: ml-server
        run: python -m unittest discover -s ml-server/tests -p "test_*.py" -v

      - name: Run Weixin regression tests
        env:
          PYTHONPATH: ml-server
        run: python -m unittest discover -s ml-server/tests -p "test_weixin*.py" -v